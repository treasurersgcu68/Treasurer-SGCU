      <!-- ============ NEWS ============ -->
      <section class="page-view page-news" data-page="news">
        <div class="page">
          <div class="page-header-flex">
            <div>
              <h1 class="page-title">ข่าวและประกาศ</h1>
              <p class="page-meta">ติดตามประกาศสำคัญ แนวปฏิบัติ และไฟล์ดาวน์โหลดล่าสุดสำหรับองค์กรและชมรม</p>
            </div>
          </div>

          <div class="filter-bar news-filter-bar" aria-label="ตัวกรองข่าวและประกาศ">
            <div class="filter-group filter-year">
              <label for="newsYearFilter">ปีการศึกษา</label>
              <select id="newsYearFilter">
                <option value="all">ทั้งหมด</option>
              </select>
            </div>
            <div class="filter-group filter-orgtype">
              <label for="newsCategoryFilter">หมวดข่าว</label>
              <select id="newsCategoryFilter">
                <option value="all">ทั้งหมด</option>
              </select>
            </div>
            <div class="filter-group filter-org">
              <label for="newsAudienceFilter">ประกาศจากฝ่าย</label>
              <select id="newsAudienceFilter">
                <option value="all">ทั้งหมด</option>
              </select>
            </div>
            <div class="filter-group filter-sort">
              <label for="newsSortSelect">เรียงตาม</label>
              <select id="newsSortSelect">
                <option value="latest">ล่าสุดก่อน</option>
                <option value="oldest">เก่าสุดก่อน</option>
                <option value="pinned">ปักหมุดก่อน</option>
                <option value="title">ชื่อข่าว A-Z</option>
              </select>
            </div>
            <div class="filter-group filter-search">
              <label for="newsSearchInput">ค้นหาข่าวหรือประกาศ</label>
              <div class="search-box">
                <input
                  id="newsSearchInput"
                  type="search"
                  placeholder="พิมพ์คำค้น เช่น แนวปฏิบัติ หรือ ดาวน์โหลด"
                  autocomplete="off"
                />
                <button id="newsFilterReset" class="search-clear" type="button" aria-label="ล้างตัวกรองข่าว">
                  ✕
                </button>
              </div>
            </div>
          </div>

          <section class="panel">
            <header class="panel-header">
              <div>
                <h3 class="panel-title">รายการข่าวและประกาศ</h3>
                <div id="newsFilterSummary" class="panel-caption">กำลังโหลดข่าว...</div>
              </div>
            </header>

            <div id="newsListSkeleton" class="news-list-skeleton" aria-hidden="true">
              <div class="skeleton-card">
                <div class="skeleton-line short"></div>
                <div class="skeleton-line"></div>
                <div class="skeleton-line"></div>
              </div>
              <div class="skeleton-card">
                <div class="skeleton-line short"></div>
                <div class="skeleton-line"></div>
                <div class="skeleton-line"></div>
              </div>
              <div class="skeleton-card">
                <div class="skeleton-line short"></div>
                <div class="skeleton-line"></div>
                <div class="skeleton-line"></div>
              </div>
            </div>

            <div id="newsList" class="news-list"></div>
            <div class="news-list-actions">
              <button id="newsLoadMoreBtn" class="news-load-more" type="button">โหลดเพิ่ม</button>
            </div>
          </section>
        </div>
      </section>
